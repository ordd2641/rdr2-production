<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RDR2 Production Online</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:#15110d;
color:#f3e7c9;
font-family:Arial,sans-serif;
padding:40px;
}

.card{
background:#221913;
border:1px solid #4a3828;
padding:20px;
border-radius:12px;
max-width:900px;
margin:auto;
}

h1{
margin-top:0;
}

.status{
padding:12px;
border-radius:8px;
margin-top:15px;
}

.ok{
background:#1f3a1f;
color:#9ce49c;
}

.loading{
background:#3a321f;
color:#f0d9a1;
}
</style>
</head>
<body>

<div class="card">
<h1>RDR2 Production — Online</h1>

<div id="status" class="status loading">
Подключение к облаку...
</div>

<div style="margin-top:20px">
<b>Supabase:</b><br>
<span id="cloud-state">Ожидание подключения...</span>
</div>

<div style="margin-top:30px;border-top:1px solid #4a3828;padding-top:20px;">
<h2>Online склад</h2>

<div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
<button onclick="addWater()" style="padding:10px 16px;background:#2c2118;color:#fff;border:1px solid #5b4632;cursor:pointer;border-radius:8px;">
+1 Вода
</button>

<button onclick="removeWater()" style="padding:10px 16px;background:#3b1d1d;color:#fff;border:1px solid #6b4444;cursor:pointer;border-radius:8px;">
-1 Вода
</button>
</div>

<div id="inventory-view"></div>
</div>
</div>

<script>
const SUPABASE_URL = 'https://cypspnueblwlwqmkwxvr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cHNwbnVlYmx3bHdxbWt3eHZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTkxOTMsImV4cCI6MjA5NDczNTE5M30.wycI0cLxAB0-Exl4TAY7TJ16ZPO_tNBFPLKB6a_voNU';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const statusEl = document.getElementById('status');
const cloudStateEl = document.getElementById('cloud-state');
const inventoryView = document.getElementById('inventory-view');

let cloudState = {
inventory:{
'Вода':0
}
};

async function loadCloudState(){
const { data, error } = await supabaseClient
.from('app_state')
.select('*')
.limit(1)
.single();

if(error){
console.error(error);
statusEl.className='status';
statusEl.innerHTML='Ошибка подключения к Supabase';
return;
}

statusEl.className='status ok';
statusEl.innerHTML='Подключено к realtime cloud storage';

cloudStateEl.innerHTML=`
ID записи: ${data.id}<br>
Последнее обновление: ${data.updated_at}
`;

console.log('CLOUD STATE',data);

if(data.data && typeof data.data === 'object'){
cloudState = data.data;
}

renderInventory();
}

function renderInventory(){
inventoryView.innerHTML='';

Object.entries(cloudState.inventory || {}).forEach(([name,value])=>{
const div=document.createElement('div');

div.style.marginBottom='8px';
div.innerHTML=`${name}: <b>${value}</b>`;

inventoryView.appendChild(div);
});
}

async function saveCloudState(){
const { error } = await supabaseClient
.from('app_state')
.update({
data: cloudState,
updated_at: new Date().toISOString()
})
.eq('id',1);

if(error){
console.error(error);
return;
}
}

async function addWater(){
cloudState.inventory['Вода']=(cloudState.inventory['Вода']||0)+1;
renderInventory();
await saveCloudState();
}

async function removeWater(){
cloudState.inventory['Вода']=Math.max(0,(cloudState.inventory['Вода']||0)-1);
renderInventory();
await saveCloudState();
}

function startRealtime(){
supabaseClient
.channel('app_state_changes')
.on(
'postgres_changes',
{
event:'*',
schema:'public',
table:'app_state'
},
(payload)=>{
console.log('REALTIME UPDATE',payload);

if(payload.new && payload.new.data){
cloudState = payload.new.data;
renderInventory();
}

statusEl.innerHTML='Получено realtime обновление';

setTimeout(()=>{
statusEl.innerHTML='Подключено к realtime cloud storage';
},1500);
}
)
.subscribe();
}

loadCloudState();
startRealtime();
</script>

</body>
</html>
