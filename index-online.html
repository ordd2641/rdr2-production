.section-title{

@media (max-width:1400px){

const allIngredients=[...new Set(Object.values(recipes).flatMap(r=>Object.keys(r.ingredients)))].sort();

let isCrafting=false;

let cloudState={
inventory:{},
prices:{},
needed:{},
production_history:{},
ratings:{}
};

const craftedProductsToRemove=[
'Жареные котлеты',
'Картошка с мясом',
'Кофе',
'Тушеное мясо по-апалачски',
'Суп чероки',
'Цыпленок табака',
'Чай из женьшеня',
'Чай пузэр'
];

function cleanupCraftedProducts(){
craftedProductsToRemove.forEach(item=>{
if(cloudState.inventory && cloudState.inventory[item]!=null){
delete cloudState.inventory[item];
}
});
}


allIngredients.forEach(i=>{
if(cloudState.inventory[i]==null) cloudState.inventory[i]=0;
if(cloudState.prices[i]==null) cloudState.prices[i]=0;
});

async function loadCloudState(){
const {data,error}=await supabaseClient
.from('app_state')
.select('*')
.eq('id',1)
.single();

if(error){
console.error(error);
statusEl.innerHTML='Ошибка подключения';
return;
}

statusEl.className='status ok';
statusEl.innerHTML='Подключено к realtime cloud storage';

cloudStateEl.innerHTML=`ID: ${data.id}<br>Обновлено: ${data.updated_at}`;

if(data.data){
cloudState=data.data;
}

cleanupCraftedProducts();

if(!cloudState.inventory) cloudState.inventory={};
if(!cloudState.prices) cloudState.prices={};
if(!cloudState.needed) cloudState.needed={};
if(!cloudState.production_history) cloudState.production_history=[];
if(!cloudState.ratings) cloudState.ratings={};

allIngredients.forEach(i=>{
if(cloudState.inventory[i]==null) cloudState.inventory[i]=0;
if(cloudState.prices[i]==null) cloudState.prices[i]=0;
});

renderAll();
}

function renderAll(){
renderInventory();
renderCrafting();
renderNeeded();
renderProductionLog();
}

inventoryView.className='inventory-grid';




allIngredients.forEach(i=>{

cloudState.inventory[i]=0;
}
});

Object.entries(cloudState.inventory)
.filter(([name])=>name.toLowerCase().includes(inventorySearch))

.forEach(([name,val])=>{

div.style.minHeight='150px';
div.style.display='flex';
div.style.flexDirection='column';
div.style.justifyContent='space-between';

if(cloudState.prices[name]==null){
cloudState.prices[name]=0;
}

const price=cloudState.prices[name]||0;

div.innerHTML=`
<div style="font-weight:bold;color:#f0d9a1;font-size:15px;margin-bottom:10px;line-height:1.2;min-height:38px;">
${name}
</div>

</div>

<div style="display:flex;gap:6px;margin-bottom:10px;">
<button onclick="changeItem('${name}',1)" style="flex:1">+</button>
<button onclick="changeItem('${name}',-1)" style="flex:1">-</button>
</div>

<div style="display:flex;align-items:center;gap:8px;">
<span style="font-size:12px;color:#b89f74;width:55px">Цена</span>
<input type="number" value="${price}" step="0.01" style="width:100%;background:#1b1410;border:1px solid #4a3828;color:#f3e7c9;padding:6px;border-radius:6px" onchange="changePrice('${name}',this.value)">
</div>
`;

inventoryView.appendChild(div);
});
}


function setRating(item,value){
if(!cloudState.ratings){
cloudState.ratings={};
}

cloudState.ratings[item]=value;

renderCrafting();
saveCloudState();
}


function renderCrafting(){
craftingView.innerHTML='';
craftingView.className='production-grid';

const craftSearch=(document.getElementById('craft-search')?.value||'').toLowerCase();

const grouped={
food:Object.entries(recipes)
.filter(([_,r])=>r.category==='food')
.sort((a,b)=>a[0].localeCompare(b[0],'ru')),

alcohol:Object.entries(recipes)
.filter(([_,r])=>r.category==='alcohol')
.sort((a,b)=>a[0].localeCompare(b[0],'ru'))
};

Object.entries(grouped).forEach(([group,items])=>{
const title=document.createElement('div');
title.className='section-title';
title.innerHTML=`<h2>${group==='food'?'ЕДА':'АЛКОГОЛЬ'}</h2>`;
craftingView.appendChild(title);

items
.filter(([name])=>name.toLowerCase().includes(craftSearch))
.forEach(([name,recipe])=>{
let possible=999999;
let cost=0;

const ingredientsHtml=Object.entries(recipe.ingredients).map(([ing,amount])=>{
const have=cloudState.inventory[ing]||0;
const ok=have>=amount;
possible=Math.min(possible,Math.floor(have/amount));
cost+=(cloudState.prices[ing]||0)*amount;
return `<div style="color:${ok?'#86d986':'#ff7f7f'};font-size:13px;margin-bottom:4px;">(${have}) ${ing}: ${amount}</div>`;
}).join('');

if(!isFinite(possible)) possible=0;

const card=document.createElement('div');
card.className='card production-item';

const rating=cloudState.ratings?.[name]||0;

const stars=[1,2,3,4].map(i=>{
return `<span 
onclick="setRating('${name}',${i})"
style="cursor:pointer;font-size:14px;color:${i<=rating?'#ffd27d':'#5f4a32'};">
★
</span>`;
}).join('');

card.innerHTML=`

<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
<h3 style="margin:0;">${name}</h3>

<div style="display:flex;gap:2px;">
${stars}
</div>
</div>

<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Выход: x${recipe.output}</div>
<div>${ingredientsHtml}</div>
<div style="margin-top:12px;font-size:13px;">Можно создать: <b>${possible}</b></div>
<div style="font-size:12px;color:var(--gold2);margin-top:6px;">Себестоимость: $${cost.toFixed(2)}</div>
<div style="display:flex;gap:8px;margin-top:14px;">
<button style="flex:1" onclick="craftItem('${name}')">Произвести</button>
<button onclick="undoCraft('${name}')">↶</button>

</div>
`;

craftingView.appendChild(card);
});
});
}


function renderProductionLog(){
const logContainer=document.getElementById('production-log');

if(!logContainer) return;

logContainer.innerHTML='';

const logs=[...(cloudState.production_history||[])].reverse();

if(logs.length===0){
logContainer.innerHTML='<div class="card">Лог пока пуст</div>';
return;
}

logs.forEach(log=>{
const card=document.createElement('div');
card.className='card';
card.style.marginBottom='12px';

const ingredients=Object.entries(log.ingredients||{})
.map(([ing,amount])=>`<div style="margin-top:4px;">- ${ing}: ${amount}</div>`)
.join('');

card.innerHTML=`
<div style="font-size:10px;color:#b79d77;margin-bottom:6px;">
${log.time}
</div>

<div style="font-size:14px;font-weight:700;color:#f0d9a1;">
${log.item}
</div>

<div style="margin-top:6px;font-size:11px;line-height:1.3;">
${ingredients}
</div>
`;

logContainer.appendChild(card);
});
}



function clearNeededOrders(){

Object.keys(cloudState.needed||{}).forEach(key=>{
cloudState.needed[key]=0;
});

renderNeeded();
saveCloudState();
}


function renderNeeded(){
const products=document.getElementById('needed-products');
const ingredients=document.getElementById('needed-ingredients');
const shopping=document.getElementById('needed-shopping');
const orderedSmall=document.getElementById('ordered-products-small');

products.innerHTML='';
ingredients.innerHTML='';
shopping.innerHTML='';

if(orderedSmall){
orderedSmall.innerHTML='';
}

const search=(document.getElementById('needed-search')?.value||'').toLowerCase();
const totals={};

const grouped={
food:Object.entries(recipes)
.filter(([_,r])=>r.category==='food')
.filter(([name])=>name.toLowerCase().includes(search))
.sort((a,b)=>a[0].localeCompare(b[0],'ru')),

alcohol:Object.entries(recipes)
.filter(([_,r])=>r.category==='alcohol')
.filter(([name])=>name.toLowerCase().includes(search))
.sort((a,b)=>a[0].localeCompare(b[0],'ru'))
};

Object.entries(grouped).forEach(([group,items])=>{
const title=document.createElement('div');
title.className='section-title';
title.innerHTML=`
<div style="display:flex;justify-content:space-between;align-items:center;">
<h3 style="margin:0;">${group==='food'?'ЕДА':'АЛКОГОЛЬ'}</h3>

${group==='food' ? `
<button 
onclick="clearNeededOrders()"
style="padding:4px 8px;font-size:11px;">
Очистить все
</button>
` : ''}

</div>
`;
products.appendChild(title);

items.forEach(([name,recipe])=>{
if(cloudState.needed[name]==null){
cloudState.needed[name]=0;
}

const value=cloudState.needed[name]||0;

const card=document.createElement('div');
card.className='card';
card.style.marginBottom='12px';

card.innerHTML=`

<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">

<div>
<div style="font-weight:700;color:var(--gold);margin-bottom:6px;">${name}</div>
<div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Выход x${recipe.output}</div>
</div>

<button 
class="remove-btn"
style="padding:2px 7px;font-size:11px;line-height:1;">
✕
</button>

</div>

<div style="display:flex;gap:8px;align-items:center;">
<button class="minus-btn">-</button>
<input type="number" value="${value}" style="width:80px;">
<button class="plus-btn">+</button>
</div>
`;

const input=card.querySelector('input');
const plus=card.querySelector('.plus-btn');
const minus=card.querySelector('.minus-btn');
const remove=card.querySelector('.remove-btn');

input.oninput=async()=>{
cloudState.needed[name]=parseInt(input.value)||0;
renderNeeded();
await saveCloudState();
};

plus.onclick=async()=>{
cloudState.needed[name]=(cloudState.needed[name]||0)+1;
renderNeeded();
await saveCloudState();
};

minus.onclick=async()=>{
cloudState.needed[name]=Math.max(0,(cloudState.needed[name]||0)-1);
renderNeeded();
await saveCloudState();
};

remove.onclick=async()=>{
cloudState.needed[name]=0;
renderNeeded();
await saveCloudState();
};

products.appendChild(card);

if(value>0 && orderedSmall){

const ordered=document.createElement('div');

ordered.style.marginBottom='4px';

ordered.innerHTML=`• ${name} x${value}`;

orderedSmall.appendChild(ordered);
}

if(value>0){
Object.entries(recipe.ingredients).forEach(([ing,amount])=>{
if(!totals[ing]) totals[ing]=0;
totals[ing]+=amount*value;
});
}
});
});

Object.entries(totals)
.sort((a,b)=>a[0].localeCompare(b[0],'ru'))
.forEach(([ing,total])=>{
const have=cloudState.inventory[ing]||0;
const miss=Math.max(0,total-have);
const price=cloudState.prices[ing]||0;

const ingCard=document.createElement('div');
ingCard.className='card';
ingCard.style.marginBottom='12px';
ingCard.innerHTML=`
<div style="font-weight:700;color:var(--gold);">${ing}</div><div style="margin-top:4px;">Нужно: ${total}</div>
<div>На складе: ${have}</div>
<div style="color:${miss>0?'#ff7f7f':'#86d986'};margin-top:6px;">
${miss>0?`Не хватает: ${miss}`:'Хватает'}
</div>
`;

ingredients.appendChild(ingCard);

if(miss>0){
const shop=document.createElement('div');
shop.className='card';
shop.style.marginBottom='12px';
shop.innerHTML=`
<div style="font-weight:700;color:var(--gold);">${ing}</div>
<div style="margin-top:6px;">Количество: ${miss}</div>
<div style="margin-top:6px;color:var(--gold2);">Сумма: $${(miss*price).toFixed(2)}</div>
`;
shopping.appendChild(shop);
}
});
}

document.addEventListener('input',(e)=>{
if(e.target.id==='needed-search') renderNeeded();
if(e.target.id==='inventory-search') renderInventory();
if(e.target.id==='craft-search') renderCrafting();
});

function openTab(id,el){
document.querySelectorAll('.tab-section').forEach(s=>s.style.display='none');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).style.display='block';
el.classList.add('active');
}

function startRealtime(){
supabaseClient
.channel('app_state_changes')
.on('postgres_changes',{
event:'*',
schema:'public',
table:'app_state'
},payload=>{
if(payload.new && payload.new.data){
cloudState=payload.new.data;
cleanupCraftedProducts();

if(!cloudState.inventory) cloudState.inventory={};
if(!cloudState.prices) cloudState.prices={};
if(!cloudState.needed) cloudState.needed={};

allIngredients.forEach(i=>{
if(cloudState.inventory[i]==null) cloudState.inventory[i]=0;
if(cloudState.prices[i]==null) cloudState.prices[i]=0;
});

renderAll();
}
})
.subscribe();
}


async function saveCloudState(){

const sync=document.getElementById('sync-state');

if(sync){
sync.innerHTML='Синхронизация...';
}

await supabaseClient
.from('app_state')
.update({
data:cloudState
})
.eq('id',1);

if(sync){
sync.innerHTML='Сохранено';
setTimeout(()=>{
sync.innerHTML='';
},1500);
}
}


async function changeItem(name,delta){
if(cloudState.inventory[name]==null){
cloudState.inventory[name]=0;
}

cloudState.inventory[name]=Math.max(0,(cloudState.inventory[name]||0)+delta);

renderAll();
await saveCloudState();
}

async function setInventoryValue(name,value){
cloudState.inventory[name]=Math.max(0,parseInt(value)||0);
renderAll();
await saveCloudState();
}

async function changePrice(name,value){
cloudState.prices[name]=Math.max(0,parseFloat(value)||0);
renderAll();
await saveCloudState();
}


async function craftItem(name){

if(isCrafting) return;

isCrafting=true;

const recipe=recipes[name];
if(!recipe){
isCrafting=false;
return;
}

for(const [ing,amount] of Object.entries(recipe.ingredients)){
const have=cloudState.inventory[ing]||0;

if(have<amount){
alert('Недостаточно ингредиентов');
isCrafting=false;
return;
}
}

for(const [ing,amount] of Object.entries(recipe.ingredients)){
cloudState.inventory[ing]=Math.max(0,(cloudState.inventory[ing]||0)-amount);
}

if(name==='Спирт'){
cloudState.inventory['Спирт']=(cloudState.inventory['Спирт']||0)+1;
}

if(!Array.isArray(cloudState.production_history)){
cloudState.production_history=[];
}

cloudState.production_history.push({
item:name,
time:new Date().toLocaleString('ru-RU'),
ingredients:recipe.ingredients
});

if(cloudState.production_history.length>50){
cloudState.production_history=cloudState.production_history.slice(-50);
}

renderAll();

await saveCloudState();

setTimeout(()=>{
isCrafting=false;
},500);
}


async function undoCraft(name){
const recipe=recipes[name];
if(!recipe) return;

if(name==='Спирт'){

if((cloudState.inventory['Спирт']||0)<=0){
return;
}

cloudState.inventory['Спирт']-=1;
}

for(const [ing,amount] of Object.entries(recipe.ingredients)){
cloudState.inventory[ing]=(cloudState.inventory[ing]||0)+amount;
}

renderAll();
await saveCloudState();
}


const APP_PASSWORD='1122';

function checkSavedAuth(){
const saved=localStorage.getItem('rdr2_auth');

if(saved){
const data=JSON.parse(saved);

if(data.expires>Date.now()){
document.getElementById('auth-screen').style.display='none';
return true;
}
}

return false;
}

function checkPassword(){
const input=document.getElementById('password-input').value;
const error=document.getElementById('auth-error');

if(input===APP_PASSWORD){

localStorage.setItem('rdr2_auth',JSON.stringify({
expires:Date.now()+(1000*60*60*24*30)
}));

document.getElementById('auth-screen').style.display='none';
return;
}

error.innerHTML='Неверный пароль';
}

window.addEventListener('keydown',e=>{
if(e.key==='Enter'){
const auth=document.getElementById('auth-screen');

if(auth && auth.style.display!=='none'){
checkPassword();
}
}
});

if(!checkSavedAuth()){
document.querySelector('.main-wrapper').style.display='none';

const observer=setInterval(()=>{
const auth=document.getElementById('auth-screen');

if(auth.style.display==='none'){
document.querySelector('.main-wrapper').style.display='block';
clearInterval(observer);
}
},200);
}else{
document.querySelector('.main-wrapper').style.display='block';
}


loadCloudState();
startRealtime();
</script>
