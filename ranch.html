
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emerald Ranch</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
background:#0f0907;
color:#f3e7c9;
font-family:Arial,sans-serif;
}

.tabs{
position:sticky;
top:0;
z-index:9999;
display:flex;
gap:8px;
padding:12px;
background:#120b08;
border-bottom:1px solid #5a3c24;
}

.tab-btn{
padding:10px 16px;
background:#2c1d15;
border:1px solid #5a3c24;
color:#f3e7c9;
border-radius:8px;
cursor:pointer;
}

.tab-btn.active{
background:#4a2d1a;
}

.wrapper{
padding:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:14px;
}

.card{
background:#1b130f;
border:1px solid #5a3c24;
border-radius:12px;
padding:14px;
}

input,button{
padding:8px;
border-radius:8px;
border:1px solid #5a3c24;
background:#140e0b;
color:#f3e7c9;
}

button{
cursor:pointer;
}

.auth{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#0a0604;
z-index:999999;
}

.auth-box{
width:320px;
padding:24px;
background:#1b130f;
border:1px solid #5a3c24;
border-radius:12px;
}

.small{
font-size:11px;
color:#b79d77;
}

.green{color:#86d986;}
.red{color:#ff7f7f;}

.section-title{
font-size:24px;
margin-bottom:18px;
}

.grow-layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

@media(max-width:900px){
.grow-layout{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<div id="auth" class="auth">
<div class="auth-box">

<div class="section-title">Emerald Ranch</div>

<input id="password" type="password" placeholder="Пароль" style="width:100%;margin-bottom:12px;">

<button onclick="login()" style="width:100%;">Войти</button>

<div id="auth-error" class="red small" style="margin-top:10px;"></div>

</div>
</div>

<div class="tabs">
<button class="tab-btn active" onclick="openTab('seeds',this)">Семена</button>
<button class="tab-btn" onclick="openTab('grow',this)">Рост</button>
<button class="tab-btn" onclick="openTab('inventory',this)">Склад</button>
<button class="tab-btn" onclick="openTab('orders',this)">Заказы</button>
<button class="tab-btn" onclick="openTab('logs',this)">Лог</button>

<div style="margin-left:auto;">
<button class="tab-btn" onclick="logout()">
Выйти
</button>
</div>
</div>

<div class="wrapper">

<div id="seeds" class="tab-section">
<div class="section-title">Посадка</div><input id="seed-search" placeholder="Поиск..." style="width:100%;margin-bottom:18px;" oninput="renderSeeds()">
<div id="seed-list" class="grid"></div>
</div>

<div id="grow" class="tab-section" style="display:none;">
<div class="section-title">Рост</div><input id="growth-search" placeholder="Поиск..." style="width:100%;margin-bottom:18px;" oninput="renderGrowth()">

<div class="grow-layout">

<div>
<h3>В процессе роста</h3>
<div id="growing-list"></div>
</div>

<div>
<h3>Готово к сбору</h3>
<div id="ready-list"></div>
</div>

</div>
</div>

<div id="inventory" class="tab-section" style="display:none;">
<div class="section-title">Склад</div><input id="inventory-search" placeholder="Поиск..." style="width:100%;margin-bottom:18px;" oninput="renderInventory()">
<div id="inventory-list"></div>
</div>


<div id="orders" class="tab-section" style="display:none;">
<div class="section-title">Заказы</div>

<button onclick="createOrder()" style="margin-bottom:18px;">
+ Новый заказ
</button>

<div id="orders-list"></div>

</div>

<div id="logs" class="tab-section" style="display:none;">
<div class="section-title">Лог</div>
<div id="logs-list"></div>
</div>

</div>

<script>

const SUPABASE_URL='https://cypspnueblwlwqmkwxvr.supabase.co';

const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN5cHNwbnVlYmx3bHdxbWt3eHZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxNTkxOTMsImV4cCI6MjA5NDczNTE5M30.wycI0cLxAB0-Exl4TAY7TJ16ZPO_tNBFPLKB6a_voNU';

const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const USERS={
'1111':'Игрок 1',
'2222':'Игрок 2',
'3333':'Игрок 3'
};

let currentUser='';

let isCollecting=false;

let saveTimeout=null;

function queueSave(){
clearTimeout(saveTimeout);

saveTimeout=setTimeout(()=>{
queueSave();

setTimeout(()=>{isCollecting=false;},500);
},300);
}


const seeds=[
{name:'Дикая мята',yield:5,growMinutes:150,business:'Алкоголь',spoils:false},
{name:'Прерийный мак',yield:5,growMinutes:210,business:'Медицина',spoils:false},
{name:'Тысячелистник',yield:5,growMinutes:195,business:'Медицина',spoils:false},
{name:'Алоэ',yield:5,growMinutes:255,business:'Алкоголь',spoils:false},
{name:'Агава',yield:5,growMinutes:225,business:'Алкоголь',spoils:false},
{name:'Молочай',yield:5,growMinutes:180,business:'Медицина',spoils:false},
{name:'Олеандровый шалфей',yield:5,growMinutes:180,business:'Алкоголь',spoils:false},
{name:'Сахарный тростник',yield:4,growMinutes:240,business:'Алкоголь',spoils:false},
{name:'Черная смородина',yield:5,growMinutes:180,business:'Алкоголь',spoils:true},
{name:'Хлопок',yield:4,growMinutes:225,business:'Ткань',spoils:false},
{name:'Пшеница',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Хмель',yield:5,growMinutes:180,business:'Алкоголь',spoils:false},
{name:'Дикая морковь',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Красная малина',yield:5,growMinutes:120,business:'Алкоголь',spoils:true},
{name:'Редис',yield:5,growMinutes:180,business:'Еда',spoils:true},
{name:'Черника',yield:5,growMinutes:120,business:'Алкоголь',spoils:true},
{name:'Кукуруза',yield:6,growMinutes:225,business:'Еда',spoils:true},
{name:'Аляскинский женьшень',yield:5,growMinutes:180,business:'Медицина',spoils:false},
{name:'Американский женьшень',yield:5,growMinutes:180,business:'Медицина',spoils:false},
{name:'Грибница гриб-зонтика',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Томат',yield:5,growMinutes:180,business:'Еда',spoils:true},
{name:'Шпинат',yield:5,growMinutes:180,business:'Еда',spoils:true},
{name:'Душица',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Чок Дейзи',yield:5,growMinutes:180,business:'Медицина',spoils:false},
{name:'Тимьян ползучего',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Коки',yield:5,growMinutes:180,business:'Алкоголь',spoils:false},
{name:'Риса',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Капусты',yield:5,growMinutes:180,business:'Еда',spoils:true},
{name:'Брокколи',yield:5,growMinutes:180,business:'Еда',spoils:true},
{name:'Картофеля',yield:5,growMinutes:180,business:'Еда',spoils:true},
{name:'Кровавого цветка',yield:5,growMinutes:180,business:'Алкоголь',spoils:false},
{name:'Сливы ползучей',yield:5,growMinutes:180,business:'Алкоголь',spoils:true},
{name:'Дикого чеснока',yield:5,growMinutes:180,business:'Еда',spoils:false},
{name:'Английской булавы',yield:5,growMinutes:180,business:'Медицина',spoils:false},
{name:'Индийского табака',yield:5,growMinutes:180,business:'Табак',spoils:false},
{name:'Красного шалфея',yield:5,growMinutes:180,business:'Медицина',spoils:false},
{name:'Зимнезеленой ягоды',yield:5,growMinutes:180,business:'Алкоголь',spoils:true},
{name:'Каннабиса',yield:5,growMinutes:180,business:'Табак',spoils:false}
];

let state={
plants:[],
inventory:{},
logs:[],
orders:[]
};

function openTab(id,el){

document.querySelectorAll('.tab-section').forEach(s=>{
s.style.display='none';
});

document.querySelectorAll('.tab-btn').forEach(b=>{
b.classList.remove('active');
});

document.getElementById(id).style.display='block';

el.classList.add('active');
}

function addLog(text){

if(!Array.isArray(state.logs)){
state.logs=[];
}

state.logs.push({
text,
createdAt:Date.now()
});

const fiveDays=1000*60*60*24*5;

state.logs=state.logs.filter(log=>{
return (Date.now()-log.createdAt)<fiveDays;
});
}

async function loadState(){

const {data}=await supabaseClient
.from('ranch_app')
.select('*')
.eq('id',1)
.single();

if(data && data.data){
state=data.data;
}

if(!state.plants) state.plants=[];
if(!state.inventory) state.inventory={};
if(!state.logs) state.logs=[];
if(!state.orders) state.orders=[];

renderAll();
}

async function saveState(){

await supabaseClient
.from('ranch_app')
.update({
data:state
})
.eq('id',1);
}

function login(){

const pass=document.getElementById('password').value;

if(!USERS[pass]){
document.getElementById('auth-error').innerHTML='Неверный пароль';
return;
}

currentUser=USERS[pass];

localStorage.setItem('ranch_auth',JSON.stringify({
name:currentUser,
expires:Date.now()+(1000*60*60*24*30)
}));

document.getElementById('auth').style.display='none';
}


function logout(){

localStorage.removeItem('ranch_auth');

location.reload();
}


function checkAuth(){

const saved=localStorage.getItem('ranch_auth');

if(!saved) return;

const data=JSON.parse(saved);

if(data.expires>Date.now()){
currentUser=data.name;
document.getElementById('auth').style.display='none';
}
}

function renderSeeds(){

const root=document.getElementById('seed-list');

root.innerHTML='';

const search=(document.getElementById('seed-search')?.value||'').toLowerCase();

seeds.filter(seed=>seed.name.toLowerCase().includes(search)).forEach(seed=>{

const card=document.createElement('div');

card.className='card';

card.innerHTML=`
<div style="font-size:20px;color:#f0d9a1;margin-bottom:10px;">
${seed.name}
</div>

<div class="small">Урожай: x${seed.yield}</div>
<div class="small">Рост: ${seed.growMinutes} мин</div>
<div class="small">Бизнес: ${seed.business}</div>

<div class="small ${seed.spoils?'red':'green'}">
${seed.spoils?'Портится':'Не портится'}
</div>

<input id="seed-${seed.name}" type="number" placeholder="Количество" style="width:100%;margin-top:12px;">

<button onclick="plant('${seed.name}')" style="width:100%;margin-top:8px;">
Посадить
</button>
`;

root.appendChild(card);

});
}

async function plant(name){

const seed=seeds.find(s=>s.name===name);

const amount=parseInt(document.getElementById(`seed-${name}`).value)||0;

if(amount<=0) return;

state.plants.push({
id:Date.now()+Math.random(),
name,
amount,
yield:seed.yield,
readyAt:Date.now()+(seed.growMinutes*60*1000),
plantedBy:currentUser
});

addLog(`${currentUser} посадил ${name} x${amount}`);

renderAll();

queueSave();
}

function renderGrowth(){

const growing=document.getElementById('growing-list');
const ready=document.getElementById('ready-list');

growing.innerHTML='';
ready.innerHTML='';

const growthSearch=(document.getElementById('growth-search')?.value||'').toLowerCase();

[...state.plants]
.filter(plant=>plant.name.toLowerCase().includes(growthSearch))
.sort((a,b)=>a.readyAt-b.readyAt)
.forEach(plant=>{

const remaining=plant.readyAt-Date.now();

const card=document.createElement('div');

card.className='card';

if(remaining<=0){

card.innerHTML=`
<div style="font-size:18px;color:#f0d9a1;">
${plant.name}
</div>

<div class="small">
Посадил: ${plant.plantedBy}
</div>

<div class="green" style="margin-top:8px;">
Готово к сбору
</div>

<button onclick="collect('${plant.id}')" style="margin-top:10px;">
Собрал
</button>
`;

ready.appendChild(card);

}else{

const minutes=Math.floor(remaining/1000/60);
const seconds=Math.floor((remaining/1000)%60);

card.innerHTML=`

<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">

<div>
<div style="font-size:18px;color:#f0d9a1;">
${plant.name}
</div>

<div class="small">
Посадил: ${plant.plantedBy}
</div>

<div style="margin-top:8px;">
Осталось: ${minutes}:${String(seconds).padStart(2,'0')}
</div>
</div>

<button 
onclick="removeGrowingPlant('${plant.id}')"
style="padding:2px 7px;font-size:11px;line-height:1;">
✕
</button>

</div>
`;

growing.appendChild(card);
}

});
}


async function removeGrowingPlant(id){

const plant=state.plants.find(p=>p.id==id);

if(!plant) return;

addLog(`${currentUser} удалил посадку ${plant.name}`);

state.plants=state.plants.filter(p=>p.id!=id);

renderAll();

queueSave();
}


async function collect(id){

if(isCollecting) return;

isCollecting=true;

const plant=state.plants.find(p=>p.id===id);

if(!plant) return;

const total=plant.amount*plant.yield;

if(!state.inventory[plant.name]){
state.inventory[plant.name]=0;
}

state.inventory[plant.name]+=total;

addLog(`${currentUser} собрал ${plant.name} x${total}`);

state.plants=state.plants.filter(p=>p.id!==id);

renderAll();

queueSave();
}

function renderInventory(){

const root=document.getElementById('inventory-list');

root.innerHTML='';

const inventorySearch=(document.getElementById('inventory-search')?.value||'').toLowerCase();

Object.entries(state.inventory)
.filter(([name])=>name.toLowerCase().includes(inventorySearch))
.forEach(([name,amount])=>{

const card=document.createElement('div');

card.className='card';

card.innerHTML=`
<div style="font-size:18px;color:#f0d9a1;">
${name}
</div>

<div style="margin-top:8px;">
Количество: ${amount}
</div>
`;

root.appendChild(card);

});
}


function createOrder(){

if(!Array.isArray(state.orders)){
state.orders=[];
}

state.orders.push({
id:Date.now()+Math.random(),
client:'',
dueDate:'',
createdBy:currentUser,
items:[]
});

renderOrders();
queueSave();
}

function addOrderItem(orderId,herb){

const order=state.orders.find(o=>o.id===orderId);

if(!order) return;

const input=document.getElementById(`order-${orderId}-${herb}`);

const amount=parseInt(input.value)||0;

if(amount<=0) return;

const existing=order.items.find(i=>i.name===herb);

if(existing){
existing.amount=amount;
}else{
order.items.push({
name:herb,
amount
});
}

renderOrders();
queueSave();
}

function renderOrders(){

const root=document.getElementById('orders-list');

if(!root) return;

root.innerHTML='';

state.orders.forEach(order=>{

const card=document.createElement('div');

card.className='card';

const left=seeds.map(seed=>{

return `
<div style="display:flex;gap:6px;margin-bottom:6px;">
<input 
id="order-${order.id}-${seed.name}"
type="number"
placeholder="${seed.name}"
style="flex:1;">

<button onclick="addOrderItem('${order.id}','${seed.name}')">
Добавить
</button>
</div>
`;

}).join('');

const right=order.items.map(item=>{

const stock=state.inventory[item.name]||0;

const enough=stock>=item.amount;

const seedInfo=seeds.find(s=>s.name===item.name);

const missing=Math.max(0,item.amount-stock);

const needSeeds=seedInfo
? Math.ceil(missing/seedInfo.yield)
: 0;

return `
<div style="
padding:8px;
border:1px solid #5a3c24;
border-radius:8px;
margin-bottom:8px;
background:${enough?'rgba(40,90,40,.25)':'rgba(90,40,40,.25)'};
">

<div style="font-size:16px;color:#f0d9a1;">
${item.name} x${item.amount}
</div>

<div class="small">
На складе: ${stock}
</div>

${!enough ? `
<div class="red small">
Не хватает: ${missing}
<br>
Нужно семян: ${needSeeds}
</div>
` : `
<div class="green small">
Достаточно
</div>
`}
</div>
`;

}).join('');

card.innerHTML=`
<div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px;">

<div style="flex:1;">
<input 
placeholder="Имя клиента"
value="${order.client}"
oninput="updateOrderClient('${order.id}',this.value)"
style="width:100%;margin-bottom:8px;">

<input 
type="date"
value="${order.dueDate}"
oninput="updateOrderDate('${order.id}',this.value)"
style="width:100%;">

<div class="small" style="margin-top:8px;">
Оформил: ${order.createdBy}
</div>
</div>

<button onclick="removeOrder('${order.id}')">
✕
</button>

</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">

<div>
<h3>Добавить травы</h3>
${left}
</div>

<div>
<h3>Заказ / Планировщик</h3>
${right || '<div class="small">Пусто</div>'}
</div>

</div>
`;

root.appendChild(card);

});
}

function updateOrderClient(id,value){
const order=state.orders.find(o=>o.id==id);
if(!order) return;
order.client=value;
queueSave();
}

function updateOrderDate(id,value){
const order=state.orders.find(o=>o.id==id);
if(!order) return;
order.dueDate=value;
queueSave();
}

function removeOrder(id){
state.orders=state.orders.filter(o=>o.id!=id);
renderOrders();
queueSave();
}


function renderLogs(){

const root=document.getElementById('logs-list');

root.innerHTML='';

const logs=[...state.logs].reverse();

logs.forEach(log=>{

const card=document.createElement('div');

card.className='card';

card.innerHTML=`
<div class="small">
${new Date(log.createdAt).toLocaleString('ru-RU')}
</div>

<div style="margin-top:8px;">
${log.text}
</div>
`;

root.appendChild(card);

});
}

function renderAll(){
renderSeeds();
renderGrowth();
renderInventory();
renderOrders();
renderLogs();
}

setInterval(()=>{
renderGrowth();
},1000);

checkAuth();
loadState();


supabaseClient
.channel('ranch-realtime')
.on('postgres_changes',{
event:'UPDATE',
schema:'public',
table:'ranch_app'
},payload=>{

if(payload.new && payload.new.data){
state=payload.new.data;

if(!state.plants) state.plants=[];
if(!state.inventory) state.inventory={};
if(!state.logs) state.logs=[];
if(!state.orders) state.orders=[];

renderAll();
}
})
.subscribe();


</script>

</body>
</html>
