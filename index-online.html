<style>
body{
width:100%;

}

.status{

}

}

.loading{

.inventory-grid{

max-width:none;

grid-template-columns:repeat(5,minmax(0,1fr)) !important;

align-items:start;

}

.production-grid{

align-items:start;

}

border:1px solid #4e3a29;
border-radius:10px;

}

font-size:18px;
border-bottom:1px solid #4a3828;
padding-bottom:8px;
margin-bottom:14px;
}

.tab-section{
width:100%;
max-width:none;
padding:0;
margin:0;
box-sizing:border-box;
}

.main-wrapper{
width:100vw;
max-width:100vw;
margin:0;
padding:0 14px 24px;
box-sizing:border-box;
overflow-x:hidden;
}

html,body{
width:100%;
max-width:100%;
margin:0;
padding:0;
overflow-x:hidden;
}

#inventory-section,
#craft-section,
#needed-section{
width:100%;
max-width:none;

}

#inventory-view,
#crafting-view,

width:100%;
max-width:none;

}

.inventory-grid .card{
width:100%;
min-width:0;
}

.inventory-grid input{
box-sizing:border-box;

@media (max-width:1600px){

grid-template-columns:repeat(4,minmax(0,1fr)) !important;

@media (max-width:1200px){

</div>
</div>

</div>

</div>
</div>
</div>
</div>
</div>

'Тайная бражка':{category:'alcohol',output:1,ingredients:{'Вода':1,'Сахар':3,'Спирт':1,'Чок Дейзи':3}},
'Текила Дон Хулио':{category:'alcohol',output:1,ingredients:{'Виноград':1,'Дикая мята':2,'Спирт':1,'Черника':1}},
'Фермерский тайник':{category:'alcohol',output:1,ingredients:{'Вода':1,'Алоэ':5,'Сахар':4,'Спирт':1}},
'Черничный самогон':{category:'alcohol',output:1,ingredients:{'Вода':1,'Сахар':4,'Спирт':1,'Черника':5}},
'Эйфория каннабис':{category:'alcohol',output:1,ingredients:{'Яблоко':1,'Дикая мята':1,'Листья каннабиса':2,'Ползучий тимьян':1,'Спирт':1}},
'Яблочный самогон':{category:'alcohol',output:1,ingredients:{'Вода':1,'Сахар':4,'Спирт':1,'Яблоко':5}}
};

const allIngredients=[...new Set(Object.values(recipes).flatMap(r=>Object.keys(r.ingredients)))].sort();

let cloudState={
inventory:{},
prices:{},
needed:{},
production_history:{}
};

allIngredients.forEach(i=>{
if(cloudState.inventory[i]==null) cloudState.inventory[i]=0;
if(cloudState.prices[i]==null) cloudState.prices[i]=0;
});

async function loadCloudState(){
const {data,error}=await supabaseClient
.from('app_state')
.select('*')
.eq('id',1)
.single();

if(error){
console.error(error);
statusEl.innerHTML='Ошибка подключения';
return;
}

statusEl.className='status ok';
statusEl.innerHTML='Подключено к realtime cloud storage';

cloudStateEl.innerHTML=`ID: ${data.id}<br>Обновлено: ${data.updated_at}`;

if(data.data){
cloudState=data.data;
}

if(!cloudState.inventory) cloudState.inventory={};
if(!cloudState.prices) cloudState.prices={};
if(!cloudState.needed) cloudState.needed={};
if(!cloudState.production_history) cloudState.production_history={};

allIngredients.forEach(i=>{
if(cloudState.inventory[i]==null) cloudState.inventory[i]=0;
if(cloudState.prices[i]==null) cloudState.prices[i]=0;
});

renderAll();
}

function renderAll(){
renderInventory();
renderCrafting();
renderNeeded();
}

function renderInventory(){
inventoryView.innerHTML='';

inventoryView.className='inventory-grid';




allIngredients.forEach(i=>{
if(cloudState.inventory[i]==null){
cloudState.inventory[i]=0;
}
});

const inventorySearch=(document.getElementById('inventory-search')?.value||'').toLowerCase();

Object.entries(cloudState.inventory)
.filter(([name])=>name.toLowerCase().includes(inventorySearch))
.sort((a,b)=>a[0].localeCompare(b[0],'ru'))
.forEach(([name,val])=>{
const div=document.createElement('div');

div.className='card';
div.style.padding='12px';
div.style.minHeight='150px';
div.style.display='flex';
div.style.flexDirection='column';
div.style.justifyContent='space-between';

if(cloudState.prices[name]==null){
cloudState.prices[name]=0;
}

const price=cloudState.prices[name]||0;

div.innerHTML=`
<div style="font-weight:bold;color:#f0d9a1;font-size:15px;margin-bottom:10px;line-height:1.2;min-height:38px;">
${name}
</div>

<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
<span style="font-size:12px;color:#aaa;width:55px">Кол-во</span>
<input type="number" value="${val}" style="width:100%;background:#1b1410;border:1px solid #4a3828;color:#f3e7c9;padding:6px;border-radius:6px" onchange="setInventoryValue('${name}',this.value)">
</div>

<div style="display:flex;gap:6px;margin-bottom:10px;">
<button onclick="changeItem('${name}',1)" style="flex:1">+</button>
<button onclick="changeItem('${name}',-1)" style="flex:1">-</button>
</div>

<div style="display:flex;align-items:center;gap:8px;">
<span style="font-size:12px;color:#b89f74;width:55px">Цена</span>
<input type="number" value="${price}" step="0.01" style="width:100%;background:#1b1410;border:1px solid #4a3828;color:#f3e7c9;padding:6px;border-radius:6px" onchange="changePrice('${name}',this.value)">
</div>
`;

inventoryView.appendChild(div);
});
}

function renderCrafting(){
craftingView.innerHTML='';

const craftSearch=(document.getElementById('craft-search')?.value||'').toLowerCase();

const groupedRecipes={
food:Object.entries(recipes)
.filter(([_,r])=>r.category==='food')
.sort((a,b)=>a[0].localeCompare(b[0],'ru')),

alcohol:Object.entries(recipes)
.filter(([_,r])=>r.category==='alcohol')
.sort((a,b)=>a[0].localeCompare(b[0],'ru'))
};

Object.entries(groupedRecipes).forEach(([groupName,groupItems])=>{
const section=document.createElement('div');
section.style.gridColumn='1/-1';
section.innerHTML=`<h2 style="color:#f0d9a1;border-bottom:1px solid #4a3828;padding-bottom:6px;margin:10px 0;">${groupName==='food'?'ЕДА':'АЛКОГОЛЬ'}</h2>`;
craftingView.appendChild(section);

groupItems
.filter(([name])=>name.toLowerCase().includes(craftSearch))
.forEach(([name,recipe])=>{
let possible=Infinity;

Object.entries(recipe.ingredients).forEach(([ing,amount])=>{
const have=cloudState.inventory[ing]||0;
possible=Math.min(possible,Math.floor(have/amount));
});

if(!isFinite(possible)) possible=0;

let craftCost=0;
Object.entries(recipe.ingredients).forEach(([ing,amount])=>{
craftCost+=(cloudState.prices[ing]||0)*amount;
});

const card=document.createElement('div');
card.className='card';

const ingHtml=Object.entries(recipe.ingredients).map(([ing,amount])=>{
const have=cloudState.inventory[ing]||0;
const ok=have>=amount;
return `<div style="color:${ok ? '#7fd67f' : '#ff7b7b'}">(${have}) ${ing}: ${amount}</div>`;
}).join('');

card.innerHTML=`
<h3>${name}</h3>
<div style="font-size:12px;color:#c8b28a">Выход: x${recipe.output}</div>
<div style="margin-top:10px">${ingHtml}</div>
<div style="margin-top:10px">Крафтов: ${possible}</div>
<div style="font-size:12px;color:#c8b28a;margin-top:4px">Себестоимость: $${craftCost.toFixed(2)}</div>
<div style="display:flex;gap:8px;margin-top:10px">
<button onclick="craftItem('${name}')">Произвести</button>
<button onclick="undoCraft('${name}')">↶</button>
</div>
`;

craftingView.appendChild(card);
});
});
}

function renderNeeded(){
const products=document.getElementById('needed-products');
const ingredients=document.getElementById('needed-ingredients');
const shopping=document.getElementById('needed-shopping');
const search=(document.getElementById('needed-search')?.value||'').toLowerCase();

products.innerHTML='';
ingredients.innerHTML='';
shopping.innerHTML='';

const totals={};

Object.entries(recipes)
.filter(([name])=>name.toLowerCase().includes(search))
.forEach(([name,recipe])=>{
if(cloudState.needed[name]==null){
cloudState.needed[name]=0;
}

const value=cloudState.needed[name]||0;

const card=document.createElement('div');
card.className='card';
card.style.marginBottom='10px';
card.style.padding='12px';

const orderedAmount=value*recipe.output;

card.innerHTML=`
<div style='font-weight:bold;color:#f0d9a1'>${name}</div>
<div style='font-size:12px;color:#b89f74;margin-bottom:6px'>Выход x${recipe.output}</div>
<div style='font-size:12px;color:#7fd67f;margin-bottom:10px'>Заказано: ${orderedAmount}</div>
<div style='display:flex;gap:6px;align-items:center'>
<button class='minus-btn'>-</button>
<input type='number' value='${value}' style='width:70px'>
<button class='plus-btn'>+</button>
</div>
`;

const input=card.querySelector('input');
const plus=card.querySelector('.plus-btn');
const minus=card.querySelector('.minus-btn');

input.oninput=async()=>{
cloudState.needed[name]=parseInt(input.value)||0;
renderNeeded();
await saveCloudState();
};

plus.onclick=async()=>{
cloudState.needed[name]=(cloudState.needed[name]||0)+1;
renderNeeded();
await saveCloudState();
};

minus.onclick=async()=>{
cloudState.needed[name]=Math.max(0,(cloudState.needed[name]||0)-1);
renderNeeded();
await saveCloudState();
};

products.appendChild(card);

if(value>0){
Object.entries(recipe.ingredients).forEach(([ing,amount])=>{
if(!totals[ing]) totals[ing]=0;
totals[ing]+=amount*value;
});
}
});

Object.entries(totals).forEach(([ing,total])=>{
const have=cloudState.inventory[ing]||0;
const miss=Math.max(0,total-have);
const price=cloudState.prices[ing]||0;
const totalCost=(miss*price).toFixed(2);

const card=document.createElement('div');
card.className='card';
card.style.marginBottom='10px';

card.innerHTML=`
<div><b>${ing}</b></div>
<div>Нужно: ${total}</div>
<div>На складе: ${have}</div>
<div style='color:${miss>0 ? '#ff7b7b' : '#7fd67f'}'>${miss>0 ? 'Не хватает: '+miss : 'Хватает'}</div>
<div style='font-size:12px;color:#c8b28a;margin-top:4px'>Закупка: $${totalCost}</div>
`;

ingredients.appendChild(card);

if(miss>0){
const s=document.createElement('div');
s.className='card';
s.style.marginBottom='10px';
s.innerHTML=`${ing}: ${miss}`;
shopping.appendChild(s);
}
});
}

document.addEventListener('input',(e)=>{
if(e.target.id==='needed-search'){
renderNeeded();
}

if(e.target.id==='inventory-search'){
renderInventory();
}

if(e.target.id==='craft-search'){
renderCrafting();
}
});

function startRealtime(){
supabaseClient
.channel('app_state_changes')
.on('postgres_changes',{
event:'*',
schema:'public',
table:'app_state'
},payload=>{
if(payload.new && payload.new.data){
cloudState=payload.new.data;
renderAll();
}
})
.subscribe();
}

loadCloudState();
startRealtime();
</script>

<script>
function openTab(id,el){
document.querySelectorAll('.tab-section').forEach(s=>s.style.display='none');
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).style.display='block';
el.classList.add('active');
}
</script>

.tabs{

gap:8px;

top:0;
z-index:1000;

border-bottom:1px solid #4b3928;
